name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: yenportfolioacr.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: yenportfolioacr.azurecr.io/portfolio:latest
          build-args: |
            VITE_LASTFM_API_KEY=${{ secrets.VITE_LASTFM_API_KEY }}
            VITE_LASTFM_USERNAME=${{ secrets.VITE_LASTFM_USERNAME }}

      - name: Trigger Azure to pull new image
        run: curl -X POST "${{ secrets.AZURE_WEBHOOK_URL }}"